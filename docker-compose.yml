services:
  raspicd-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: raspicd-server:latest
    container_name: raspicd-server
    restart: unless-stopped
    environment:
      RASPICD_BIND: ":8080"
      RASPICD_SECRET: "${RASPICD_SECRET}"
      RASPICD_AGENT_SECRET: "${RASPICD_AGENT_SECRET}"
      RASPICD_DEBUG: "${RASPICD_DEBUG:-false}"
    ports:
      - "8080:8080"
    volumes:
      - raspicd-data:/data

volumes:
  raspicd-data:
    driver: local
