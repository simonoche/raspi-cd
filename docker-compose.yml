services:
  raspicd-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: raspicd-server:latest
    container_name: raspicd-server
    restart: unless-stopped
    environment:
      RASPIDEPLOY_BIND: ":8080"
      RASPIDEPLOY_SECRET: "${RASPIDEPLOY_SECRET}"
      RASPIDEPLOY_AGENT_SECRET: "${RASPIDEPLOY_AGENT_SECRET}"
      RASPIDEPLOY_DEBUG: "${RASPIDEPLOY_DEBUG:-false}"
    ports:
      - "8080:8080"
    volumes:
      - raspicd-data:/data

volumes:
  raspicd-data:
    driver: local
