# Write the current commit SHA to all online agents via broadcast.
#
# Uses POST /api/v1/tasks/broadcast — the server fans out one task per online
# agent and returns all task IDs. The workflow then polls until every task
# completes (or fails).
#
# The script must be pre-installed on every Pi at:
#   /etc/raspicd/scripts/write-commit-id.sh
#
# Example script:
#   #!/usr/bin/env bash
#   set -euo pipefail
#   echo "$RASPICD_CONFIG_SHA" > /opt/commitid.txt
#   echo "Written $RASPICD_CONFIG_SHA to /opt/commitid.txt"
#
# Required repository secrets:
#   RASPICD_SERVER  — e.g. https://deploy.example.com
#   RASPICD_SECRET  — CI/CD Bearer token secret

name: Write commit ID

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RASPICD_SERVER: ${{ secrets.RASPICD_SERVER }}
  RASPICD_SECRET: ${{ secrets.RASPICD_SECRET }}
  POLL_INTERVAL: 10   # seconds between status checks
  TIMEOUT_STEPS: 18   # 18 × 10s = 3 minutes

jobs:
  write-commit-id:
    name: Write commit ID to all online agents
    runs-on: ubuntu-latest

    steps:
      - name: Broadcast task
        id: dispatch
        run: |
          RESPONSE=$(curl -sf -X POST "$RASPICD_SERVER/api/v1/tasks/broadcast" \
            -H "Authorization: Bearer $RASPICD_SECRET" \
            -H "Content-Type: application/json" \
            -d '{
              "script": "write-commit-id",
              "config": { "sha": "${{ github.sha }}" }
            }')

          echo "Broadcast response: $RESPONSE"
          # Extract task IDs as a space-separated list for the next step.
          TASK_IDS=$(echo "$RESPONSE" | jq -r '.[].task_id' | tr '\n' ' ')
          echo "task_ids=$TASK_IDS" >> "$GITHUB_OUTPUT"

      - name: Wait for all tasks to complete
        run: |
          FAILED=0

          for TASK_ID in ${{ steps.dispatch.outputs.task_ids }}; do
            echo "--- Polling task $TASK_ID ---"

            for i in $(seq 1 "$TIMEOUT_STEPS"); do
              TASK=$(curl -sf "$RASPICD_SERVER/api/v1/tasks/$TASK_ID" \
                -H "Authorization: Bearer $RASPICD_SECRET")

              STATUS=$(echo "$TASK" | jq -r .status)
              AGENT=$(echo "$TASK"  | jq -r .agent_id)
              echo "[$i/$TIMEOUT_STEPS] $AGENT — $STATUS"

              if [ "$STATUS" = "completed" ]; then
                echo "$TASK" | jq -r .output
                break
              fi

              if [ "$STATUS" = "failed" ]; then
                echo "FAILED on $AGENT"
                echo "$TASK" | jq -r .error
                echo "$TASK" | jq -r .output
                FAILED=1
                break
              fi

              if [ "$i" = "$TIMEOUT_STEPS" ]; then
                echo "Timed out waiting for task $TASK_ID on $AGENT"
                FAILED=1
              fi

              sleep "$POLL_INTERVAL"
            done
          done

          exit $FAILED
