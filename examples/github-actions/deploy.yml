# Basic deployment workflow.
#
# Triggers on every push to main and dispatches a task to one agent.
# The workflow finishes as soon as the task is accepted by the server —
# it does NOT wait for the Pi to finish executing.
# See deploy-and-wait.yml if you need CI to fail when the deployment fails.
#
# The script must be pre-installed on the Pi at:
#   /etc/raspicd/scripts/deploy-myapp.sh
#
# Required repository secrets:
#   RASPICD_SERVER  — e.g. https://deploy.example.com
#   RASPICD_SECRET  — the CI/CD Bearer token secret

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Dispatch deploy task
    runs-on: ubuntu-latest

    steps:
      - name: Send task to RasPiCD
        run: |
          curl -sf -X POST "$RASPICD_SERVER/api/v1/tasks" \
            -H "Authorization: Bearer $RASPICD_SECRET" \
            -H "Content-Type: application/json" \
            -d '{
              "agent_id": "raspi-living-room",
              "script":   "deploy-myapp",
              "config":   { "ref": "${{ github.ref_name }}" }
            }'
        env:
          RASPICD_SERVER: ${{ secrets.RASPICD_SERVER }}
          RASPICD_SECRET: ${{ secrets.RASPICD_SECRET }}
