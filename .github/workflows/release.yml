name: Release

# Triggered by a version tag: git tag v1.2.3 && git push --tags
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # create GitHub releases and upload assets
  packages: write   # push images to ghcr.io

jobs:
  # ------------------------------------------------------------------
  # 1. Tests must pass before anything is published.
  # ------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - run: go mod verify
      - run: go vet ./...
      - run: go test -race ./...

  # ------------------------------------------------------------------
  # 2. Agent: compile binaries for every supported Pi architecture
  #    and attach them to a GitHub Release.
  #
  #    Users install the agent with a single curl download — no Docker.
  #
  #    Binaries produced:
  #      raspideploy-agent-linux-arm64   Pi 3 / 4 / 5 (64-bit OS)
  #      raspideploy-agent-linux-armv7   Pi 2 / 3 (32-bit OS)
  #      raspideploy-agent-linux-amd64   x86-64 (testing / VMs)
  # ------------------------------------------------------------------
  release-agent:
    name: Release agent binaries
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build agent binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p bin

          GOOS=linux GOARCH=arm64       go build -ldflags="$LDFLAGS" -o bin/raspideploy-agent-linux-arm64  ./cmd/agent
          GOOS=linux GOARCH=arm GOARM=7 go build -ldflags="$LDFLAGS" -o bin/raspideploy-agent-linux-armv7  ./cmd/agent
          GOOS=linux GOARCH=amd64       go build -ldflags="$LDFLAGS" -o bin/raspideploy-agent-linux-amd64  ./cmd/agent

      - name: Create GitHub Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/raspideploy-agent-linux-arm64
            bin/raspideploy-agent-linux-armv7
            bin/raspideploy-agent-linux-amd64

  # ------------------------------------------------------------------
  # 3. Server: build a multi-arch Docker image and push to ghcr.io.
  #
  #    Images published:
  #      ghcr.io/<owner>/raspideploy:latest
  #      ghcr.io/<owner>/raspideploy:v1.2.3
  #
  #    Architectures: linux/amd64, linux/arm64
  #    (The build stage cross-compiles via Go — no QEMU slowness.)
  # ------------------------------------------------------------------
  publish-server:
    name: Publish server image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          # Cache layers between runs using the registry itself.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to:   type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max
